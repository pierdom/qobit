# qobit — PipeWire rate-following drop-in
#
# Install to: ~/.config/pipewire/pipewire.conf.d/10-allowed-rates.conf
# Then reload: systemctl --user restart pipewire pipewire-pulse wireplumber
#
# By default most distros lock PipeWire to a single graph clock (commonly
# clock.allowed-rates = [ 48000 ]), so every stream is resampled to 48 kHz
# before it reaches your DAC. Listing the full rate ladder your DAC supports
# lets PipeWire reclock the device to match a *solo* stream instead of
# resampling — the DAC switches rate per track while staying a normal,
# shareable system device with a working volume control.
#
# Bit-transparency note: for <=24-bit content at 100% volume with no other app
# mixing in, the bits reaching the DAC are identical to the file (PipeWire's
# internal float32 represents 24-bit exactly). It stops being bit-exact if you
# drop volume below 100%, another stream mixes in, or for 32-bit-int sources.
# For exclusive, guaranteed-always bit-perfect output, use a raw
# alsa/hw:CARD=...,DEV=0 device instead (see README "Audio device setup",
# Option B) — at the cost of the DAC going solo and losing software volume.
#
# Tailor the rate list to YOUR DAC. Discover its supported rates with:
#   cat /proc/asound/card*/stream0      # look for the "Rates:" lines
# Remove any rate your hardware does not list. The values below match a
# FiiO K13 R2R (44.1k -> 384k); DSD rates (705600, 768000) are intentionally
# omitted as qobit streams PCM FLAC only.

context.properties = {
    default.clock.allowed-rates = [ 44100 48000 88200 96000 176400 192000 352800 384000 ]
}
